services:
  palcon:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      - HTTP_ADDR=:8080
      - DATA_DIR=/data
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    restart: unless-stopped
